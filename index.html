<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="KV69AWhHpF2dVc3_v7yLgQXGjtllntoiwDXkDtA3hr4" /> 
    <title>Aykutech Dev. | High-Precision Mobile Apps</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #030712;
            --card-bg: rgba(17, 24, 39, 0.7);
            --text-main: #f8fafc;
            --text-dim: #64748b;
        }

        /* Sayfa Kaymasını Engelleme */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Gereksiz kaymayı tamamen kapatır */
            background-color: var(--bg);
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* İçeriği dikeyde tam ortalar */
            position: relative;
        }

        /* Zarif Yıldız Animasyonu */
        .stars-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
            background: radial-gradient(circle at center, #111827 0%, #030712 100%);
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.3;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.2); }
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            animation: fadeIn 1s ease-out;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 3.5rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(to bottom, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
        }

        .dev-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .container {
            width: 90%;
            max-width: 600px;
            animation: fadeIn 1.2s ease-out;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 2rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .app-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3);
        }

        .app-info h2 { font-family: 'Outfit', sans-serif; margin: 0; font-size: 1.5rem; color: #fff; }
        .app-info p { color: var(--text-dim); font-size: 0.95rem; margin: 0.25rem 0 1rem 0; }
        
        .btn {
            display: inline-flex;
            background: #fff;
            color: #000;
            padding: 0.7rem 1.4rem;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .btn:hover { background: var(--primary); color: #fff; }

        footer {
            margin-top: 3rem;
            text-align: center;
        }

        .footer-links { display: flex; gap: 1.5rem; justify-content: center; margin-bottom: 0.5rem; }
        .footer-links a { color: #475569; text-decoration: none; font-size: 0.85rem; transition: 0.2s; }
        .footer-links a:hover { color: #fff; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 600px) {
            .card { flex-direction: column; text-align: center; }
            h1 { font-size: 2.5rem; }
            html, body { overflow: auto; } /* Mobilde içerik sığmazsa kaymaya izin ver */
        }
    </style>
</head>
<body>

    <!-- Stars Background -->
    <div class="stars-container">
        <!-- Yıldızlar CSS ile rastgele yerleştiriliyor -->
        <div class="star" style="top:10%; left:20%; width:2px; height:2px; --duration:3s;"></div>
        <div class="star" style="top:25%; left:80%; width:3px; height:3px; --duration:4s;"></div>
        <div class="star" style="top:50%; left:15%; width:1px; height:1px; --duration:2s;"></div>
        <div class="star" style="top:70%; left:75%; width:2px; height:2px; --duration:5s;"></div>
        <div class="star" style="top:85%; left:30%; width:2px; height:2px; --duration:3.5s;"></div>
        <div class="star" style="top:15%; left:60%; width:1px; height:1px; --duration:2.5s;"></div>
        <div class="star" style="top:40%; left:45%; width:2px; height:2px; --duration:4.5s;"></div>
    </div>

    <header>
        <div class="dev-badge">Official Portfolio</div>
        <h1>Aykutech Dev.</h1>
    </header>

    <div class="container">
        <div class="card">
            <div class="app-icon">🔢</div>
            <div class="app-info">
                <h2>Modern Calculator</h2>
                <p>Pure design, fast logic, and a smart unit converter.</p>
                <a href="https://play.google.com/store/apps/details?id=com.aykutech.calc" class="btn" target="_blank">View on Google Play</a>
            </div>
        </div>

        <footer>
            <div class="footer-links">
                <a href="/privacy.html">Privacy Policy</a>
                <a href="mailto:aykutechdev@gmail.com">Support</a>
            </div>
            <p style="color: #334155; font-size: 0.75rem;">&copy; 2024 Aykutech Dev.</p>
        </footer>
    </div>

</body>
</html>
